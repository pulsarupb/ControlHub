services:
  driver:
    build:
      context: .
      dockerfile: Dockerfile
    image: moteus-testing-driver:jetson
    container_name: moteus-testing-driver
    platform: linux/arm64
    restart: unless-stopped
    network_mode: host
    privileged: true
    init: true
    volumes:
      - /dev:/dev
      - ./data:/data
      - /run/dbus/system_bus_socket:/run/dbus/system_bus_socket
      - /var/run/dbus/system_bus_socket:/var/run/dbus/system_bus_socket
    environment:
      - RUST_BACKTRACE=1

  desktop:
    build:
      context: ./desktop
    container_name: kasm-desktop
    platform: linux/arm64
    restart: unless-stopped
    runtime: nvidia
    shm_size: '512m'
    user: "1000:1000"
    environment:
      - VNC_PW=kasm123
    volumes:
      - ./data:/data

  web:
    image: nginx:alpine
    container_name: kasm-web
    platform: linux/arm64
    restart: unless-stopped
    ports:
      - "6900:6900"
    volumes:
      - ./desktop/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - desktop