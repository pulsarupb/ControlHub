name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to publish (example: v1.2.3)"
        required: false
        type: string
      source_ref:
        description: "Git ref/sha to build and release"
        required: false
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  resolve_tag:
    name: Resolve release tag
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.resolve.outputs.release_tag }}
      source_ref: ${{ steps.resolve.outputs.source_ref }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve tag
        id: resolve
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "push" && "${GITHUB_REF}" == refs/tags/v* ]]; then
            tag="${GITHUB_REF_NAME}"
            source_ref="${GITHUB_SHA}"
          elif [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            tag="${{ github.event.inputs.release_tag }}"
            source_ref="${{ github.event.inputs.source_ref }}"
            if [[ -z "${tag}" ]]; then
              tag="$(git tag --list 'v*' --sort=-v:refname | awk 'NR==1 { print; exit }')"
            fi
            if [[ -z "${source_ref}" ]]; then
              source_ref="$(git rev-parse origin/main)"
            fi
          else
            echo "Unsupported event context"
            exit 1
          fi
          echo "release_tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "source_ref=${source_ref}" >> "${GITHUB_OUTPUT}"

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ steps.resolve.outputs.source_ref }}

      - name: Verify tag matches workspace version
        run: |
          tag="${{ steps.resolve.outputs.release_tag }}"
          tag_version="${tag#v}"
          cargo_version=$(python -c "import tomllib; print(tomllib.load(open('Cargo.toml','rb'))['workspace']['package']['version'])")
          echo "Tag version:   ${tag_version}"
          echo "Cargo version: ${cargo_version}"
          if [[ "${tag_version}" != "${cargo_version}" ]]; then
            echo "ERROR: Tag ${tag} does not match Cargo.toml version ${cargo_version}"
            exit 1
          fi
          echo "Version verified."

  linux-server:
    name: Build server (Linux)
    runs-on: ubuntu-latest
    needs: resolve_tag
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve_tag.outputs.source_ref }}

      - uses: dtolnay/rust-toolchain@stable

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libudev-dev

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: linux-server

      - run: cargo build -p driver --release

      - run: |
          mkdir -p staging
          cp target/release/driver staging/driver-linux-x86_64

      - uses: actions/upload-artifact@v4
        with:
          name: driver-linux
          path: staging/

  linux-panels:
    name: Build panels (Linux)
    runs-on: ubuntu-latest
    needs: resolve_tag
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve_tag.outputs.source_ref }}

      - uses: dtolnay/rust-toolchain@stable

      - uses: oven-sh/setup-bun@v2

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: linux-panels

      - run: bun install
        working-directory: web

      - run: bun run tauri build
        working-directory: web

      - run: |
          mkdir -p staging
          find target/release/bundle -type f -exec cp {} staging/ \;

      - uses: actions/upload-artifact@v4
        with:
          name: panels-linux
          path: staging/

  windows-panels:
    name: Build panels (Windows)
    runs-on: windows-latest
    needs: resolve_tag
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve_tag.outputs.source_ref }}

      - uses: dtolnay/rust-toolchain@stable

      - uses: oven-sh/setup-bun@v2

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: windows-panels

      - run: bun install
        working-directory: web

      - run: bun run tauri build
        working-directory: web

      - shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path staging
          Get-ChildItem -Path target/release/bundle -Recurse -File | Copy-Item -Destination staging

      - uses: actions/upload-artifact@v4
        with:
          name: panels-windows
          path: staging/

  release:
    name: Publish release
    runs-on: ubuntu-latest
    needs: [resolve_tag, linux-server, linux-panels, windows-panels]

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List release assets
        run: ls -lh dist/

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > SHA256SUMS
          cat SHA256SUMS

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve_tag.outputs.release_tag }}
          target_commitish: ${{ needs.resolve_tag.outputs.source_ref }}
          files: dist/*
