name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to publish (example: v1.2.3)"
        required: false
        type: string
      source_ref:
        description: "Git ref/sha to build and release"
        required: false
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  resolve_tag:
    name: Resolve release tag
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.resolve.outputs.release_tag }}
      source_ref: ${{ steps.resolve.outputs.source_ref }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve tag
        id: resolve
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "push" && "${GITHUB_REF}" == refs/tags/v* ]]; then
            tag="${GITHUB_REF_NAME}"
            source_ref="${GITHUB_SHA}"
          elif [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            tag="${{ github.event.inputs.release_tag }}"
            source_ref="${{ github.event.inputs.source_ref }}"
            if [[ -z "${tag}" ]]; then
              tag="$(git tag --list 'v*' --sort=-v:refname | awk 'NR==1 { print; exit }')"
            fi
            if [[ -z "${source_ref}" ]]; then
              source_ref="$(git rev-parse origin/main)"
            fi
          else
            echo "Unsupported event context"
            exit 1
          fi
          echo "release_tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "source_ref=${source_ref}" >> "${GITHUB_OUTPUT}"

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ steps.resolve.outputs.source_ref }}

      - name: Verify tag matches workspace version
        run: |
          tag="${{ steps.resolve.outputs.release_tag }}"
          tag_version="${tag#v}"
          cargo_version=$(python -c "import tomllib; print(tomllib.load(open('Cargo.toml','rb'))['workspace']['package']['version'])")
          echo "Tag version:   ${tag_version}"
          echo "Cargo version: ${cargo_version}"
          if [[ "${tag_version}" != "${cargo_version}" ]]; then
            echo "ERROR: Tag ${tag} does not match Cargo.toml version ${cargo_version}"
            exit 1
          fi
          echo "Version verified."

  linux-server:
    name: Build server (Linux)
    runs-on: ubuntu-latest
    needs: resolve_tag
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve_tag.outputs.source_ref }}

      - uses: dtolnay/rust-toolchain@stable

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libudev-dev

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: linux-server

      - run: cargo build -p driver --release

      - run: |
          mkdir -p staging
          cp target/release/driver staging/driver-linux-x86_64

      - uses: actions/upload-artifact@v7
        with:
          name: driver-linux
          path: staging/

  linux-panels:
    name: Build panels (Linux)
    runs-on: ubuntu-latest
    needs: resolve_tag
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve_tag.outputs.source_ref }}

      - uses: dtolnay/rust-toolchain@stable

      - uses: oven-sh/setup-bun@v2

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: linux-panels

      - run: bun install
        working-directory: web

      - name: Sync tauri.conf.json version with workspace
        working-directory: web
        run: |
          VERSION=$(grep -m1 '^version = ' ../Cargo.toml | sed 's/version = "\(.*\)"/\1/')
          jq ".version = \"$VERSION\"" src-tauri/tauri.conf.json > src-tauri/tauri.conf.json.tmp
          mv src-tauri/tauri.conf.json.tmp src-tauri/tauri.conf.json
          echo "Synced tauri.conf.json version to $VERSION"

      - run: bun run tauri build
        working-directory: web

      - name: Debug - list bundle outputs
        working-directory: web
        run: |
          echo "=== appimage dir ==="
          ls -la target/release/bundle/appimage/ 2>/dev/null || echo "(no appimage dir)"
          echo "=== all bundles ==="
          find target/release/bundle -type f 2>/dev/null || true

      - name: Create updater archive and sign (Linux)
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_KEY_PASSWORD }}
        working-directory: web
        run: |
          APPIMAGE=$(ls target/release/bundle/appimage/*.AppImage 2>/dev/null | head -1)
          if [[ -n "$APPIMAGE" ]]; then
            ARCHIVE="${APPIMAGE}.tar.gz"
            tar czf "$ARCHIVE" -C "$(dirname "$APPIMAGE")" "$(basename "$APPIMAGE")"
            SIG_RAW=$(bun run tauri signer sign "$ARCHIVE" 2>/dev/null)
            echo "$SIG_RAW" | python3 -c "
import sys
raw = sys.stdin.read()
marker = 'Public signature:'
idx = raw.find(marker)
if idx >= 0:
    sig = raw[idx + len(marker):].strip()
    end = sig.find('Make sure')
    if end >= 0:
        sig = sig[:end].strip()
    sys.stdout.write(sig)
" > "${ARCHIVE}.sig"
          fi

      - run: |
          mkdir -p staging
          cp target/release/bundle/appimage/*.AppImage staging/ 2>/dev/null || true
          cp target/release/bundle/appimage/*.tar.gz staging/ 2>/dev/null || true
          cp target/release/bundle/appimage/*.sig staging/ 2>/dev/null || true
          cp target/release/bundle/deb/*.deb staging/ 2>/dev/null || true
          cp target/release/bundle/rpm/*.rpm staging/ 2>/dev/null || true

      - uses: actions/upload-artifact@v7
        with:
          name: panels-linux
          path: staging/

  windows-panels:
    name: Build panels (Windows)
    runs-on: windows-latest
    needs: resolve_tag
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve_tag.outputs.source_ref }}

      - uses: dtolnay/rust-toolchain@stable

      - uses: oven-sh/setup-bun@v2

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: windows-panels

      - run: bun install
        working-directory: web

      - name: Sync tauri.conf.json version with workspace
        shell: pwsh
        working-directory: web
        run: |
          $raw = Get-Content ../Cargo.toml -Raw
          if ($raw -match '^version = "([^"]+)"') {
            $version = $matches[1]
            $config = Get-Content src-tauri/tauri.conf.json -Raw | ConvertFrom-Json
            $config.version = $version
            $config | ConvertTo-Json -Depth 10 | Set-Content src-tauri/tauri.conf.json -Encoding ascii
            Write-Output "Synced tauri.conf.json version to $version"
          } else {
            throw "Could not extract version from Cargo.toml"
          }

      - run: bun run tauri build
        working-directory: web

      - name: Create updater archive and sign (Windows)
        shell: pwsh
        working-directory: web
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_KEY_PASSWORD }}
        run: |
          $msi = Get-ChildItem -Path ../target/release/bundle/msi -Filter *.msi -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($msi) {
            $archive = "$($msi.FullName).zip"
            Compress-Archive -Path $msi.FullName -DestinationPath $archive -Force
            $sig_raw = bun run tauri signer sign $archive 2>$null
            if ($sig_raw -match '(?s)Public signature:\s*\r?\n(.+?)\r?\n\s*Make sure') {
              $cleaned = $matches[1].Trim()
            } else {
              $cleaned = $sig_raw
            }
            Set-Content -Path "$archive.sig" -Value $cleaned -NoNewline -Encoding ascii
          }

      - name: Stage installer files (Windows)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path staging
          if (Test-Path target/release/bundle/msi) {
            Get-ChildItem -Path target/release/bundle/msi -File | Copy-Item -Destination staging
          }
          if (Test-Path target/release/bundle/nsis) {
            Get-ChildItem -Path target/release/bundle/nsis -File | Copy-Item -Destination staging
          }
          if (-not (Get-ChildItem -Path staging -File)) {
            $exe = Get-ChildItem -Path target/release -Filter "*.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($exe) {
              Copy-Item -Path $exe.FullName -Destination staging
            }
          }

      - uses: actions/upload-artifact@v7
        with:
          name: panels-windows
          path: staging/

  release:
    name: Publish release
    runs-on: ubuntu-latest
    needs: [resolve_tag, linux-server, linux-panels, windows-panels]

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve_tag.outputs.source_ref }}
          fetch-depth: 0

      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: List release assets
        run: ls -lh dist/

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > SHA256SUMS
          cat SHA256SUMS

      - name: Build updater manifest
        run: |
          extract_sig() {
            python3 -c "
import sys
raw = sys.stdin.read()
marker = 'Public signature:'
idx = raw.find(marker)
if idx >= 0:
    sig = raw[idx + len(marker):].strip()
    end = sig.find('Make sure')
    if end >= 0:
        sig = sig[:end].strip()
    sys.stdout.write(sig)
"
          }

          TAG="${{ needs.resolve_tag.outputs.release_tag }}"
          VERSION="${TAG#v}"
          PUB_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          REPO="${{ github.repository }}"
          NOTES="https://github.com/${REPO}/releases/tag/${TAG}"

          LINUX_ARCHIVE=$(ls dist/*.AppImage.tar.gz 2>/dev/null | head -1)
          LINUX_SIG=""
          LINUX_URL=""
          if [[ -n "$LINUX_ARCHIVE" ]]; then
            LINUX_SIG=$(cat "${LINUX_ARCHIVE}.sig" 2>/dev/null | extract_sig || echo "")
            LINUX_URL="https://github.com/${REPO}/releases/download/${TAG}/$(basename "$LINUX_ARCHIVE")"
          fi

          WINDOWS_ARCHIVE=$(ls dist/*.msi.zip 2>/dev/null | head -1)
          WINDOWS_SIG=""
          WINDOWS_URL=""
          if [[ -n "$WINDOWS_ARCHIVE" ]]; then
            WINDOWS_SIG=$(cat "${WINDOWS_ARCHIVE}.sig" 2>/dev/null | extract_sig || echo "")
            WINDOWS_URL="https://github.com/${REPO}/releases/download/${TAG}/$(basename "$WINDOWS_ARCHIVE")"
          fi

          jq -n \
            --arg v "$VERSION" \
            --arg d "$PUB_DATE" \
            --arg n "$NOTES" \
            --arg lsu "$LINUX_URL" \
            --arg lss "$LINUX_SIG" \
            --arg wsu "$WINDOWS_URL" \
            --arg wss "$WINDOWS_SIG" \
            '{
              version: $v,
              notes: $n,
              pub_date: $d,
              platforms: (
                (if $lss != "" then { "linux-x86_64": { signature: $lss, url: $lsu } } else {} end) +
                (if $wss != "" then { "windows-x86_64": { signature: $wss, url: $wsu } } else {} end)
              )
            }' > dist/updates.json

          cat dist/updates.json

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve_tag.outputs.release_tag }}
          target_commitish: ${{ needs.resolve_tag.outputs.source_ref }}
          files: dist/*

      - name: Commit updates.json to main
        run: |
          git fetch origin main
          git checkout main
          cp dist/updates.json updates.json
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add updates.json
          git diff --cached --quiet || git commit -m "Update updater manifest for ${{ needs.resolve_tag.outputs.release_tag }}"
          git push
