name: Auto Tag On Version Bump

on:
  push:
    branches: [main]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/auto-tag.yml"
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Read current version
        id: versions
        run: |
          new_version=$(python -c "import tomllib; print(tomllib.load(open('Cargo.toml','rb'))['workspace']['package']['version'])")
          tag="v${new_version}"
          echo "new=${new_version}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Check whether tag already exists
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ steps.versions.outputs.tag }}"
          if git ls-remote --tags --exit-code origin "refs/tags/${tag}" >/dev/null 2>&1; then
            echo "Tag ${tag} already exists on origin, skipping."
            echo "should_tag=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "Tag ${tag} is new."
          echo "should_tag=true" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        if: steps.check.outputs.should_tag == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag -a "${{ steps.versions.outputs.tag }}" -m "Release ${{ steps.versions.outputs.tag }}"
          git push origin "${{ steps.versions.outputs.tag }}"
