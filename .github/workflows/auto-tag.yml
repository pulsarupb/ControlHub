name: Auto Tag On Version Bump

on:
  push:
    branches: [main]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/auto-tag.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Read current version
        id: versions
        run: |
          new_version=$(python -c "import tomllib; print(tomllib.load(open('Cargo.toml','rb'))['workspace']['package']['version'])")
          tag="v${new_version}"
          echo "new=${new_version}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Check whether release/tag already exists
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ steps.versions.outputs.tag }}"

          if git ls-remote --tags --exit-code origin "refs/tags/${tag}" >/dev/null 2>&1; then
            echo "Tag ${tag} already exists on origin, skipping dispatch."
            echo "should_dispatch=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if gh release view "${tag}" >/dev/null 2>&1; then
            echo "Release ${tag} already exists, skipping dispatch."
            echo "should_dispatch=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "No existing release/tag found for ${tag}."
          echo "should_dispatch=true" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        if: steps.check.outputs.should_dispatch == 'true'
        run: |
          git tag "${{ steps.versions.outputs.tag }}"
          git push origin "${{ steps.versions.outputs.tag }}"

      - name: Call release workflow
        if: steps.check.outputs.should_dispatch == 'true'
        uses: ./.github/workflows/release.yml
        with:
          release_tag: ${{ steps.versions.outputs.tag }}
          source_ref: ${{ github.sha }}
        secrets: inherit
